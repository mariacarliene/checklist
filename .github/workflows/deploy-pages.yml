name: Deploy Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
    - uses: actions/checkout@v3
    - uses: actions/upload-pages-artifact@v1
      with:
        path: ./
    - uses: actions/deploy-pages@v1
    Removendo workflow de deploy
