name: Deploy Pages

# Dispara o workflow sempre que houver push na branch main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # Permite ler os arquivos do repositório
      pages: write      # Permite escrever no GitHub Pages

    steps:
      # 1️⃣ Faz checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Prepara os arquivos para o GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./   # Publica todo o conteúdo da raiz do repositório

      # 3️⃣ Publica os arquivos no GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      # 📝 Comentário opcional: notas para você
      # Aqui você pode colocar comentários como este para lembrar
      # que este workflow é responsável por publicar seu site.
