name: Deploy Pages (with Build)

# Dispara o workflow sempre que houver push na branch main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      # 1️⃣ Faz checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # você pode mudar para a versão do seu projeto

      # 3️⃣ Instala dependências do projeto
      - name: Install dependencies
        run: npm install

      # 4️⃣ Gera o build do projeto
      - name: Build project
        run: npm run build  # ajuste se o comando do seu projeto for diferente

      # 5️⃣ Prepara a pasta de build para o GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./build  # ajuste se a sua pasta de build for diferente

      # 6️⃣ Publica os arquivos no GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      # 📝 Comentário opcional
      # Este workflow gera o build automaticamente e publica no Pages.
      #Removendo workflow de deploy
