<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia – Leitura capítulo por capítulo</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f4f4f9;
}
h1 {
  text-align: center;
  margin-bottom: 10px;
}
.book {
  margin-top: 20px;
  margin-bottom: 8px;
  font-weight: bold;
  font-size: 18px;
}
.chapter {
  margin-right: 8px;
  margin-bottom: 5px;
  display: inline-block;
}
input[type="checkbox"] {
  transform: scale(1.2);
  margin-right: 4px;
}
#progresso {
  margin-bottom: 12px;
}
</style>
</head>
<body>

<h1>Bíblia – Leitura capítulo por capítulo</h1>
<p id="progresso"></p>

<div id="container"></div>

<script>

// Lista de livros + quantidade de capítulos
const livrosBiblia = [
  ["Gênesis", 50], ["Êxodo", 40], ["Levítico", 27], ["Números", 36],
  ["Deuteronômio", 34], ["Josué", 24], ["Juízes", 21], ["Rute", 4],
  ["1 Samuel", 31], ["2 Samuel", 24], ["1 Reis", 22], ["2 Reis", 25],
  ["1 Crônicas", 29], ["2 Crônicas", 36], ["Esdras", 10], ["Neemias", 13],
  ["Ester", 10], ["Jó", 42], ["Salmos", 150], ["Provérbios", 31],
  ["Eclesiastes", 12], ["Cânticos", 8], ["Isaías", 66], ["Jeremias", 52],
  ["Lamentações", 5], ["Ezequiel", 48], ["Daniel", 12], ["Oséias", 14],
  ["Joel", 3], ["Amós", 9], ["Obadias", 1], ["Jonas", 4],
  ["Miquéias", 7], ["Naum", 3], ["Habacuque", 3], ["Sofonias", 3],
  ["Ageu", 2], ["Zacarias", 14], ["Malaquias", 4],
  ["Mateus", 28], ["Marcos", 16], ["Lucas", 24], ["João", 21],
  ["Atos", 28], ["Romanos", 16], ["1 Coríntios", 16],
  ["2 Coríntios", 13], ["Gálatas", 6], ["Efésios", 6],
  ["Filipenses", 4], ["Colossenses", 4], ["1 Tessalonicenses", 5],
  ["2 Tessalonicenses", 3], ["1 Timóteo", 6], ["2 Timóteo", 4],
  ["Tito", 3], ["Filemom", 1], ["Hebreus", 13], ["Tiago", 5],
  ["1 Pedro", 5], ["2 Pedro", 3], ["1 João", 5], ["2 João", 1],
  ["3 João", 1], ["Judas", 1], ["Apocalipse", 22]
];

const container = document.getElementById("container");

// Cria checkboxes
livrosBiblia.forEach(([livro, totCap]) => {
  const titulo = document.createElement("div");
  titulo.className = "book";
  titulo.textContent = livro;
  container.appendChild(titulo);

  for (let i = 1; i <= totCap; i++) {
    const label = document.createElement("label");
    label.className = "chapter";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.id = `${livro}_${i}`;

    // Carrega leitura salva
    if (localStorage.getItem(`${livro}_${i}`) === "true") {
      cb.checked = true;
    }

    cb.addEventListener("change", () => {
      localStorage.setItem(`${livro}_${i}`, cb.checked);
      atualizarProgresso();
    });

    const span = document.createElement("span");
    span.textContent = i;

    label.appendChild(cb);
    label.appendChild(span);
    container.appendChild(label);
  }
});

function atualizarProgresso() {
  const total = livrosBiblia.reduce((a, [,n]) => a + n, 0);
  const marcados = document.querySelectorAll("input:checked").length;
  const pct = ((marcados / total) * 100).toFixed(1);
  document.getElementById("progresso").innerText =
    `Você leu ${marcados} de ${total} capítulos — ${pct}%`;
}

atualizarProgresso();

</script>

</body>
</html>
